<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
    <section class="container">
        <div class="card">
            <div class="logo">
                <img src="/images/logo.png" alt="">
            </div>
            <div class="header">
                <h2>Create Account</h2>
                <p>Join in to the ethio Internship</p>
            </div>
            <form class="main">
                <div class="group">
                    <label>Full Name</label>
                    <input type="text" placeholder="e.g Abel Birhanu" required>
                </div>
                <div class="group">
                    <label>Email Address</label>
                    <input type="email" placeholder="e.g bruke@gmail.com" required>
                </div>
                <div class="group">
                    <label>Password</label>
                    <input type="password" placeholder="......." minlength="6" required>
                </div>
                <div class="group">
                    <label> Confirm Password</label>
                    <input type="password" placeholder="........" required>
                </div>
                <button type="submit">Sign Up Now</button>
            </form>
            <div class="divider">
                <span>----Or continue with-----</span>
            </div>
            <div class="social">
                <button >
                    <img src="https://www.google.com/favicon.ico" alt="Google" width="16" height="16">
                    Google
                </button>
                <button >
                    <img src="https://github.com/favicon.ico" alt="Github" width="16" height="16">
                    Github
                </button>
            </div>
            <div class="footer">
                <p>Already a Member ?</p>
                <a href="./login.html">Login</a>
            </div>
        </div>
    </section>
</body>
</html>
